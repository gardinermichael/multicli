name: Release & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    name: Check if release needed
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Decide
        id: decide
        run: |
          # Manual dispatch always releases
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Manual dispatch — releasing"
            exit 0
          fi

          # Skip version-bump commits made by this workflow (defense-in-depth;
          # pushes via GITHUB_TOKEN don't trigger workflows anyway)
          AUTHOR=$(git log -1 --format='%an')
          MSG=$(git log -1 --format='%s')
          if [ "$AUTHOR" = "github-actions[bot]" ] && echo "$MSG" | grep -qE "^chore: release v"; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Skipping — this is a version bump commit"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Will release"
          fi

  scan:
    name: Security Scan
    needs: check
    if: needs.check.outputs.should_release == 'true'
    uses: ./.github/workflows/scan.yml
    permissions:
      security-events: write
      contents: read
      actions: read

  test:
    name: Tests
    needs: scan
    uses: ./.github/workflows/tests.yml

  release:
    name: Publish & Release
    needs: [check, test]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js 24
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Verify npm supports OIDC
        run: |
          NPM_VERSION=$(npm --version)
          echo "npm version: $NPM_VERSION"
          MAJOR=$(echo "$NPM_VERSION" | cut -d. -f1)
          MINOR=$(echo "$NPM_VERSION" | cut -d. -f2)
          if [ "$MAJOR" -lt 11 ] || ([ "$MAJOR" -eq 11 ] && [ "$MINOR" -lt 5 ]); then
            echo "::error::npm >= 11.5.1 required for OIDC. Found: $NPM_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to $VERSION"

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public

      - name: Commit version bump, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.bump.outputs.version }}`,
              name: `v${{ steps.bump.outputs.version }}`,
              generate_release_notes: true,
            });
